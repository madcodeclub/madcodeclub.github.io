<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAD CODE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Arial', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: 900;
      letter-spacing: -2px;
      text-transform: uppercase;
      color: #fff;
    }

    h1 span {
      color: #a7ff02;
    }

    p {
      margin-top: 1.5rem;
      font-size: clamp(1rem, 3vw, 1.3rem);
      color: #aaa;
      max-width: 500px;
      line-height: 1.6;
    }

    .badge {
      margin-top: 2.5rem;
      display: inline-block;
      border: 1px solid #a7ff02;
      color: #a7ff02;
      padding: 0.5rem 1.5rem;
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <h1>MAD <span>CODE</span></h1>
  <p>Espacio para artistas emergentes, underground e independientes. Próximamente.</p>
  <div class="badge">Coming soon</div>

</body>
</html>
