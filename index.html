    /* Estilos generales */
    body {
      font-family: 'IntegralCF', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Cambio solicitado: h2 con NeueMontreal-Bold */
    h2 {
      font-family: 'NeueMontreal-Bold', sans-serif;
      font-weight: bold;
    }

    section {
      padding: 50px 20px;
    }

    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s ease-out;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    form {
      display: flex;
      flex-direction: column;
      max-width: 500px;
      margin: 0 auto;
    }

    input, select, button {
      margin-bottom: 15px;
      padding: 10px;
      font-family: inherit;
    }

    button {
      background-color: #000;
      color: #fff;
      border: none;
      cursor: pointer;
    }

    footer {
      background: #f4f4f4;
      padding: 20px;
      text-align: center;
    }

  <header>

  <section class="reveal">

  </section>

  <section class="reveal">
    <h2>Inscripción</h2>
    <form id="inscripcionForm" action="https://formspree.io/f/madcode.info@gmail.com" method="POST">
      <input type="text" id="nombre" name="nombre" placeholder="Tu Nombre" required>
      <input type="email" id="email" name="_replyto" placeholder="Tu Email" required>
      <select id="rol" name="rol" required>
        <option value="" disabled selected>Selecciona tu rol</option>
        <option value="developer">Developer</option>
        <option value="designer">Designer</option>
        <option value="client">Cliente</option>
      </select>
      <input type="url" id="link" name="link" placeholder="Link (Portfolio/Web)" required>
      
      <input type="text" name="_gotcha" style="display:none">
      
      <button type="submit">Enviar</button>
    </form>
    <div id="formSuccess" style="display:none;">
      <p>¡Gracias! Tu mensaje ha sido enviado correctamente.</p>
    </div>

  </footer>

  <script>
    // Observador para animaciones de revelado
    const reveals = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    reveals.forEach(r => observer.observe(r));
